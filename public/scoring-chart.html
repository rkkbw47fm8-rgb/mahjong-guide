var GROUP_FIRST = [0, 1, 3, 4, 7, 8, 9, 13, 14, 15, 18, 22, 24];

function buildTable() {
  var tbody = document.getElementById('tbody');
  var html = '';
  for (var i = 0; i < ROWS.length; i++) {
    var mult = ROWS[i][0], name = ROWS[i][1], tiles = ROWS[i][2], desc = ROWS[i][3];
    var isFirst = GROUP_FIRST.indexOf(i) >= 0;
    var isPinghu = (mult === 0);
    html += '<tr' + (isPinghu ? ' class="row-pinghu"' : '') + '>';
    if (isFirst) {
      if (isPinghu) {
        html += '<td class="mult-pinghu" rowspan="1">—</td>';
      } else {
        var m = mult, c = 0;
        for (var j = i; j < ROWS.length && ROWS[j][0] === m; j++) c++;
        var colors = {3:"#e87070",4:"#e89050",6:"#d09030",7:"#c08030",8:"#b07030",9:"#d06060",10:"#c05050",11:"#b04040",13:"#a03030",16:"#902828",20:"#802020",24:"#701818"};
        html += '<td class="mult-cell" rowspan="'+c+'" style="background:'+colors[mult]+'">'+mult+'倍</td>';
      }
    }
    html += '<td class="name-cell' + (isPinghu ? ' name-pinghu' : '') + '">'+name+'</td>';
    html += '<td class="tile-cell">';
    if (name === '十三幺') {
      html += '<span class="tg">';
      for (var k = 0; k < tiles.length; k++) html += '<img src="'+TILEIMGS[tiles[k]]+'" class="ti">';
      html += '</span>';
    } else {
      var groups = [tiles.slice(0,3),tiles.slice(3,6),tiles.slice(6,9),tiles.slice(9,12),tiles.slice(12,14)];
      for (var g = 0; g < groups.length; g++) {
        html += '<span class="tg">';
        for (var k = 0; k < groups[g].length; k++) html += '<img src="'+TILEIMGS[groups[g][k]]+'" class="ti">';
        html += '</span>';
      }
    }
    html += '</td>';
    html += '<td class="desc-cell">'+desc+'</td>';
    html += '</tr>';
  }
  tbody.innerHTML = html;
}
